version: '3.8'

services:
  minio:
    build:
      context: .
      dockerfile: Dockerfile
    # Sin container_name estático: Docker/Coolify asigna nombres únicos por deployment.
    healthcheck:
      test:
        - CMD
        - curl
        - '-f'
        - 'http://localhost:9000/minio/health/live'
      interval: 30s
      timeout: 20s
      retries: 3
    environment:
      MINIO_ROOT_USER: '${MINIO_ROOT_USER}'
      MINIO_ROOT_PASSWORD: '${MINIO_ROOT_PASSWORD}'
      MINIO_SERVER_URL: '${MINIO_SERVER_URL}'
      MINIO_BROWSER_REDIRECT_URL: '${MINIO_BROWSER_REDIRECT_URL}'
      MINIO_BROWSER_REDIRECT: 'on'
    volumes:
      # Instancia nueva para Bookylink: ruta distinta a la de la primera instancia
      # (/mnt/data/files) para que no compartan ni corrompan datos entre sí.
      - '/mnt/data/bookylink-files:/data'
    # Sin "ports": Coolify no permite variables ahí (mismo motivo que en volumes)
    # y el acceso real va por Traefik usando SERVICE_FQDN_MINIO, no por puerto de host.
    expose:
      - '9000'
      - '9001'
    command: 'server /data --console-address ":9001" --address ":9000"'
    networks:
      - coolify

  # No es un segundo MinIO (eso corrompería los datos al escribir dos procesos
  # sobre el mismo volumen): es un simple proxy TCP hacia el puerto de consola
  # del servicio "minio" real. Existe solo para que Coolify tenga un servicio
  # llamado "minio-console" al que colgar el dominio SERVICE_FQDN_MINIO_CONSOLE.
  minio-console:
    image: alpine/socat
    command: 'tcp-listen:9001,fork,reuseaddr tcp-connect:minio:9001'
    depends_on:
      - minio
    healthcheck:
      # curl no existe en esta imagen (solo trae socat); usamos el propio
      # socat para comprobar que el puerto 9001 acepta conexiones.
      test:
        - CMD-SHELL
        - 'socat -u OPEN:/dev/null TCP:127.0.0.1:9001,connect-timeout=3 || exit 1'
      interval: 30s
      timeout: 20s
      retries: 3
    expose:
      - '9001'
    networks:
      - coolify

networks:
  coolify:
    external: true
