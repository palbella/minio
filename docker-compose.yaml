version: '3.8'

services:
  minio:
    build:
      context: .
      dockerfile: Dockerfile
    # Sin container_name estático: Docker/Coolify asigna nombres únicos por deployment.
    healthcheck:
      test:
        - CMD
        - curl
        - '-f'
        - 'http://localhost:9000/minio/health/live'
      interval: 30s
      timeout: 20s
      retries: 3
    environment:
      MINIO_ROOT_USER: '${MINIO_ROOT_USER}'
      MINIO_ROOT_PASSWORD: '${MINIO_ROOT_PASSWORD}'
      MINIO_SERVER_URL: '${MINIO_SERVER_URL}'
      MINIO_BROWSER_REDIRECT_URL: '${MINIO_BROWSER_REDIRECT_URL}'
      MINIO_BROWSER_REDIRECT: 'on'
    volumes:
      # Obligatoria: si dos deploys en el mismo servidor comparten ruta,
      # dos procesos MinIO escribirían sobre los mismos ficheros y corromperían los datos.
      - '${MINIO_STORAGE_PATH:?Define MINIO_STORAGE_PATH con una ruta única para este deploy (ej. /mnt/data/files-a)}:/data'
    ports:
      # Obligatorios: cada deploy en el mismo servidor debe usar puertos host distintos.
      - '${MINIO_PORT_API:?Define MINIO_PORT_API con un puerto único para este deploy}:9000'
      - '${MINIO_PORT_CONSOLE:?Define MINIO_PORT_CONSOLE con un puerto único para este deploy}:9001'
    command: 'server /data --console-address ":9001" --address ":9000"'
    networks:
      - coolify

networks:
  coolify:
    external: true